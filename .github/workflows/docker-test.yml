name: Docker Token Utilization Test
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test Docker Hub token
        run: |
          echo "=== Docker login with runner token ==="
          echo "Z2l0aHViYWN0aW9uczozZDY0NzJiOS0zZDQ5LTRkMTctOWZjOS05MGQyNDI1ODA0M2I=" | base64 -d | docker login --username githubactions --password-stdin 2>&1
          
          echo "=== Try docker pull ==="
          docker pull alpine:latest 2>&1
          
          echo "=== Check docker info ==="
          docker info 2>&1 | head -5
          
          echo "=== Check if docker socket is accessible ==="
          ls -la /var/run/docker.sock 2>&1
          
          echo "=== Try docker pull with token ==="
          docker pull hello-world:latest 2>&1
