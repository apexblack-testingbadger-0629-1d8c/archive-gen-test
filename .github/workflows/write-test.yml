name: File Write Persistence Test
on: [push]
jobs:
  write:
    runs-on: ubuntu-latest
    steps:
      - name: Test file write persistence
        run: |
          echo "=== Write to /tmp ==="
          echo "CANARY_WRITE_TEST_$(date +%s)" > /tmp/canary-write-test.txt
          cat /tmp/canary-write-test.txt
          
          echo "=== Write to /opt ==="
          echo "OPT_CANARY_$(date +%s)" > /opt/canary-opt-write.txt 2>&1 || echo "cannot write to /opt"
          cat /opt/canary-opt-write.txt 2>/dev/null || echo "no read"
          
          echo "=== Write to /home/runner ==="
          echo "RUNNER_CANARY_$(date +%s)" > /home/runner/canary-home.txt
          cat /home/runner/canary-home.txt
          
          echo "=== Write to shared action cache ==="
          ls -la /opt/actionarchivecache/ 2>/dev/null || echo "no archive cache"
          echo "ARCHIVE_CANARY" > /opt/actionarchivecache/canary.txt 2>&1 || echo "cannot write to archive"
          
          echo "=== Check /etc write ==="
          echo "ETC_CANARY" > /etc/canary-test.txt 2>&1 || echo "cannot write to /etc"
          
          echo "=== Write to workspace ==="
          echo "WORKSPACE_CANARY_$(date +%s)" > $GITHUB_WORKSPACE/canary-work.txt
          cat $GITHUB_WORKSPACE/canary-work.txt
          
          echo "=== Docker write test ==="
          docker run --rm -v /:/host alpine:latest sh -c "echo DOCKER_WRITE_CANARY_$(date +%s) > /host/tmp/docker-canary.txt && cat /host/tmp/docker-canary.txt" 2>&1 || echo "docker write failed"
