name: GITHUB_TOKEN Boundary Test
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Test internal API access with GITHUB_TOKEN
        run: |
          echo "=== Can token access other repos? ==="
          curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/github" 2>&1 || echo "failed"
          
          echo "=== Can token access internal githubapp.com? ==="
          curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token $GH_TOKEN" "https://api.github.com/" 2>&1 || echo "failed"
          
          echo "=== Can token access GitHub meta? ==="
          curl -s -H "Authorization: token $GH_TOKEN" "https://api.github.com/meta" 2>&1 | head -3
          
          echo "=== Can token access enterprise endpoints? ==="
          curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token $GH_TOKEN" "https://api.github.com/enterprises/github" 2>&1 || echo "failed"
          
          echo "=== Token permissions check ==="
          curl -s -H "Authorization: token $GH_TOKEN" "https://api.github.com/rate_limit" 2>&1 | head -5
          
          echo "=== List all repos accessible to token ==="
          curl -s -H "Authorization: token $GH_TOKEN" "https://api.github.com/user/repos?per_page=2" 2>&1 | head -5
          
          echo "=== Access GitHub internal API ==="
          curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token $GH_TOKEN" "https://api.github.com/internal/graphql" 2>&1 || echo "failed"
