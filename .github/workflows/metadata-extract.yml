name: Azure Metadata Extraction
on: [push]
jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Extract Azure instance metadata
        run: |
          echo "=== Instance Metadata ==="
          curl -s -H "Metadata:true" "http://169.254.169.254/metadata/instance?api-version=2021-02-01" || echo "No instance metadata"
          
          echo "=== Compute Metadata ==="
          curl -s -H "Metadata:true" "http://169.254.169.254/metadata/instance/compute?api-version=2021-02-01" || echo "No compute metadata"
          
          echo "=== Network Metadata ==="
          curl -s -H "Metadata:true" "http://169.254.169.254/metadata/instance/network?api-version=2021-02-01" || echo "No network metadata"
          
          echo "=== Identity Token ==="
          curl -s -H "Metadata:true" "http://169.254.169.254/metadata/identity/oauth2/token?api-version=2018-02-01&resource=https://management.azure.com/" || echo "No identity token"
          
          echo "=== Attested Data ==="
          curl -s -H "Metadata:true" "http://169.254.169.254/metadata/attested/document?api-version=2021-02-01" || echo "No attested data"
          
          echo "=== Load Balancer Metadata ==="
          curl -s -H "Metadata:true" "http://169.254.169.254/metadata/loadbalancer?api-version=2021-02-01" || echo "No LB metadata"
