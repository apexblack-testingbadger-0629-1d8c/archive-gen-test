name: NPM Traversal Test
on: [workflow_dispatch]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          registry-url: https://registry.npmjs.org/
      
      - name: Create and publish crafted package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          mkdir pkg
          cd pkg
          echo "{\"name\":\"apex-black-actions-test\",\"version\":\"1.0.0\"}" > package.json
          echo "safe" > index.js
          npm pack
          # This would need NPM_TOKEN secret
          # npm publish
