name: GITHUB_TOKEN Capability Test
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test GITHUB_TOKEN capabilities
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Token metadata ==="
          curl -s -H "Authorization: token $GH_TOKEN" "https://api.github.com/user" | head -5
          
          echo "=== Try to access other repos ==="
          curl -s -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/github/codeql" | head -5
          
          echo "=== Try to access GitHub internal API ==="
          curl -s -H "Authorization: token $GH_TOKEN" "https://api.github.com/meta" | head -5
          
          echo "=== Try to access actions internal ==="
          curl -sv "https://api.githubapp.com/" 2>&1 | head -5
          
      - name: Check runner filesystem for secrets
        run: |
          echo "=== Sensitive files ==="
          ls -la /home/runner/ 2>/dev/null
          ls -la /opt/ 2>/dev/null
          
          echo "=== Check for runner credentials ==="
          env | grep -i "token\|secret\|key\|password\|auth" | head -20
          
          echo "=== Check .gitconfig ==="
          cat ~/.gitconfig 2>/dev/null
          
          echo "=== Check runner temp files ==="
          find /home/runner/work/_temp -type f 2>/dev/null | head -10
          
      - name: Try to write persistent file
        run: |
          echo "Writing test file..."
          echo "persistent test" > /tmp/persistent-canary.txt
          cat /tmp/persistent-canary.txt
          
          # Try to access Docker socket
          ls -la /var/run/docker.sock 2>/dev/null
          
          # Check if we can mount anything
          mount 2>/dev/null | head -5
