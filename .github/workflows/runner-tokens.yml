name: Runner Token Discovery
on: [push]
jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Discover tokens
        run: |
          echo "=== Runner config files ==="
          for f in /home/runner/actions-runner/.runner /home/runner/actions-runner/.credentials /home/runner/actions-runner/.credentials_rsaparams; do
            echo "--- $f ---"
            cat "$f" 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); [print(k,':', str(v)[:60]) for k,v in d.items()]" 2>/dev/null || echo "not found or not json"
          done
          
          echo "=== HCA env ==="
          env | grep HCA 2>/dev/null || echo "no HCA env"
          
          echo "=== ACTIONS env ==="
          env | grep ACTIONS_ 2>/dev/null | sed 's/=.*/=***/' | head -10
          
          echo "=== RUNNER env ==="
          env | grep RUNNER_ 2>/dev/null | sed 's/=.*/=***/' | head -10
          
          echo "=== OIDC check ==="
          echo "ID_TOKEN_URL: $ACTIONS_ID_TOKEN_REQUEST_URL" 2>/dev/null || echo "no id token url"
          
          echo "=== All non-standard env ==="
          env | grep -v -E "^(PATH|HOME|USER|PWD|LANG|LC_|DEBIAN|DOTNET|JAVA|ANDROID|CHROME|PIPX|SELENIUM|CONDA|GRADLE|ANT|VCPKG|BOOST|AGENT|ImageOS|ImageVersion|INVOCATION|STATS|PERFLOG|SWIFT|POWERSHELL|HOMEBREW|NVM|PHP|GOROOT|LD_LIBRARY|PKG_CONFIG|CPLUS|CXX|CC=|SHELL|SHLVL|LOGNAME|XDG|DBUS|LESSCLOSE|LESSOPEN|TERM|GPG|SSH|GIT_|LS_COLORS|MANPATH|INFOPATH|OLDPWD|_=|BASH|HOSTNAME|WSL)" | head -30
